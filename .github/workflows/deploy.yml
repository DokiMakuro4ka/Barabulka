name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List directory structure
        run: |
          ls -la project/
          ls -la project/TG_bot/ || echo "TG_bot folder not found"

      - name: Check Dockerfile exists
        run: |
          ls -la project/TG_bot/Dockerfile

      # Сборка образа веб-приложения
      - name: Build web image
        run: |
          docker build -t barabulka-web:latest ./project/web

      # Сборка образа бота
      - name: Build bot image
        run: |
          cd project/TG_bot
          docker build -t barabulka-bot:latest .
          cd ../..

      # Сохраняем оба образа в один архив
      - name: Save images to tar
        run: |
          docker save barabulka-web:latest barabulka-bot:latest | gzip > images.tar.gz

      # Подготавливаем docker-compose.prod.yml (заменяем build на image)
      - name: Prepare production compose file
        run: |
          sed 's|build: ./project/TG_bot|image: barabulka-bot:latest|g' ./project/docker-compose.yml | \
          sed 's|build: ./project/web|image: barabulka-web:latest|g' > docker-compose.prod.yml

      # Копируем на VPS
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "images.tar.gz,docker-compose.prod.yml"
          target: ${{ secrets.VPS_PATH }}
          strip_components: 0

      # Развёртывание
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            docker load < images.tar.gz
            mv docker-compose.prod.yml docker-compose.yml
            docker-compose down || true
            docker-compose up -d
            docker system prune -af
