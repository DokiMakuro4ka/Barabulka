name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Сборка образа веб-приложения (используем cd для чистоты)
      - name: Build web image
        run: |
          cd project/web
          docker build -t barabulka-web:latest .
          cd ../..

      # Сборка образа бота
      - name: Build bot image
        run: |
          cd project/TG_bot
          docker build -t barabulka-bot:latest .
          cd ../..

      # Сохраняем оба образа в один архив
      - name: Save images to tar
        run: |
          docker save barabulka-web:latest barabulka-bot:latest | gzip > images.tar.gz

      # Подготавливаем docker-compose.prod.yml (заменяем build на image)
      - name: Prepare production compose file
        run: |
          sed 's|build: ./TG_bot|image: barabulka-bot:latest|g' ./project/docker-compose.yml | \
          sed 's|build: ./web|image: barabulka-web:latest|g' > docker-compose.prod.yml

      # Очистка старой папки на VPS и копирование новых файлов
      - name: Clean up old files and copy new ones to VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            # Останавливаем старые контейнеры (если есть)
            docker-compose down || true
            # Удаляем старые образы (оставляем volumes, чтобы не потерять данные)
            docker system prune -af || true
            # Удаляем старые файлы compose, архив и env (который мы заново создадим)
            rm -f docker-compose.yml docker-compose.prod.yml images.tar.gz .env

      # Копируем новые файлы на VPS (образы и compose)
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "images.tar.gz,docker-compose.prod.yml"
          target: ${{ secrets.VPS_PATH }}
          strip_components: 0
          overwrite: true

      # Финальное развёртывание на VPS
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            
            # Переименовываем compose файл
            mv docker-compose.prod.yml docker-compose.yml
            
            # Загружаем образы
            docker load < images.tar.gz
            
            # Создаём файл .env (используем секреты GitHub)
            cat > .env << EOF
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EOF
            
            # Запускаем контейнеры
            docker-compose up -d
            
            # Небольшая пауза, чтобы контейнеры успели стартовать
            sleep 5
            
            # Проверяем статус и выводим логи веба (для отладки)
            docker-compose ps
            echo "=== Logs for web ==="
            docker-compose logs --tail=20 web || true
            
            echo "✅ Deployment finished"