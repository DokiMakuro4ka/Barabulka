{% extends "base.html" %}
{% block content %}
<h1>Авторизация</h1>
<p>Войдите с помощью вашего Telegram-аккаунта:</p>

<!-- Виджет Telegram Login -->
<script async src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="{{ bot_username }}"
        data-size="large"
        data-auth-url="{{ url_for('telegram_callback', _external=True) }}"
        data-request-access="write"></script>

<p style="margin-top: 20px;"><a href="{{ url_for('index') }}">Вернуться на главную</a></p>
{% endblock %}
