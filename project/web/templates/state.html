{% extends "base.html" %}
{% block content %}

<p>{{ state[2] }}</p>
<h2>Эпохи</h2>
<ul>
{% for epoch in epochs %}

{% endfor %}
</ul>
<a href="{{ url_for('choose_state') }}">⬅️ Назад</a>
{% endblock %}
